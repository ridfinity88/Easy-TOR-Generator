<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการ TOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --dark: #343a40;
            --bg: #f0f2f5;
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        /* การจัดการหน้า (Views) */
        .view { display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .view.active { display: block; animation: fadeIn 0.3s ease-in; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
        }

        h2 { color: var(--dark); margin-bottom: 25px; }

        /* ปุ่มต่างๆ */
        .menu-btn {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            transition: 0.2s;
        }

        .menu-btn:hover { background: var(--primary); color: white; }

        .action-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .action-btn:disabled { background: #ccc; cursor: not-allowed; }

        .back-btn {
            background: none;
            border: none;
            color: #666;
            text-decoration: underline;
            margin-top: 20px;
            cursor: pointer;
            display: inline-block;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }

        /* พื้นที่ซ่อนสำหรับการเรนเดอร์ภาพ */
        #capture-container { position: absolute; left: -9999px; top: 0; }
        .render-box { display: inline-block; background: transparent; color: black; white-space: nowrap; font-size: 24px; }

    </style>
</head>
<body>

<!-- หน้าแรก: เมนูหลัก -->
<div id="homeView" class="view active">
    <div class="card">
        <h2>ระบบจัดการ TOR</h2>
        <button class="menu-btn" onclick="showView('sendView')">ส่ง TOR</button>
        <button class="menu-btn" onclick="showView('createView')">สร้าง TOR</button>
        <button class="menu-btn" onclick="showView('statusView')">สถานะ TOR</button>
        <button class="menu-btn" onclick="checkAuth()">อนุมัติ TOR</button>
    </div>
</div>

<!-- หน้าที่ 1: ส่ง TOR -->
<div id="sendView" class="view">
    <div class="card">
        <h2>ส่ง TOR</h2>
        <p>หน้านี้ใช้สำหรับส่งเอกสารระบบ TOR</p>
        <button class="back-btn" onclick="showView('homeView')">กลับหน้าหลัก</button>
    </div>
</div>

<!-- หน้าที่ 2: สร้าง TOR (ฟังก์ชันเดิมของคุณ) -->
<div id="createView" class="view">
    <div class="card">
        <h2>สร้างเอกสาร TOR</h2>
        <div class="input-group">
            <label>ชื่อ-นามสกุล:</label>
            <input type="text" class="data-input" id="input1" maxlength="50">
        </div>
        <div class="input-group">
            <label>ตำแหน่ง/แผนก:</label>
            <input type="text" class="data-input" id="input2" maxlength="50">
        </div>
        <div class="input-group">
            <label>เบอร์โทรศัพท์:</label>
            <input type="text" class="data-input" id="input3" maxlength="50">
        </div>
        <div class="input-group">
            <label>รายละเอียดงาน:</label>
            <input type="text" class="data-input" id="input4" maxlength="50">
        </div>
        <button id="downloadBtn" class="action-btn" disabled>กรุณากรอกข้อมูลให้ครบ</button>
        <br>
        <button class="back-btn" onclick="showView('homeView')">กลับหน้าหลัก</button>
    </div>
</div>

<!-- หน้าที่ 3: สถานะ TOR -->
<div id="statusView" class="view">
    <div class="card">
        <h2>สถานะ TOR</h2>
        <p>กำลังติดตามสถานะเอกสาร...</p>
        <button class="back-btn" onclick="showView('homeView')">กลับหน้าหลัก</button>
    </div>
</div>

<!-- หน้าที่ 4: อนุมัติ TOR (Protected) -->
<div id="approveView" class="view">
    <div class="card">
        <h2 style="color: var(--success);">หน้าอนุมัติ TOR</h2>
        <p>รายการเอกสารที่รอการอนุมัติ</p>
        <button class="back-btn" onclick="showView('homeView')">กลับหน้าหลัก</button>
    </div>
</div>

<!-- พื้นที่ Render ภาพ -->
<div id="capture-container">
    <div id="box1" class="render-box"></div>
    <div id="box2" class="render-box"></div>
    <div id="box3" class="render-box"></div>
    <div id="box4" class="render-box"></div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
    // --- ฟังก์ชันจัดการเปลี่ยนหน้า ---
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0,0);
    }

    // --- ฟังก์ชันเช็ครหัสผ่าน ---
    function checkAuth() {
        const pass = prompt("กรุณาใส่รหัสผ่านเพื่อเข้าสู่หน้าอนุมัติ:");
        if (pass === "123456789") {
            showView('approveView');
        } else if (pass !== null) {
            alert("รหัสผ่านไม่ถูกต้อง!");
        }
    }

    // --- ฟังก์ชันสร้าง PDF (คงเดิมจากที่คุยกัน) ---
    const inputs = document.querySelectorAll('.data-input');
    const downloadBtn = document.getElementById('downloadBtn');

    inputs.forEach(input => {
        input.addEventListener('input', () => {
            const allFilled = Array.from(inputs).every(i => i.value.trim() !== "");
            if (allFilled) {
                downloadBtn.disabled = false;
                downloadBtn.innerText = "ดาวน์โหลด PDF";
            } else {
                downloadBtn.disabled = true;
                downloadBtn.innerText = "กรุณากรอกข้อมูลให้ครบ";
            }
        });
    });

    async function generatePDF() {
        downloadBtn.disabled = true;
        downloadBtn.innerText = "กำลังสร้างไฟล์...";

        try {
            const templateUrl = 'template.pdf'; 
            const existingPdfBytes = await fetch(templateUrl).then(res => {
                if(!res.ok) throw new Error();
                return res.arrayBuffer();
            });

            const imgDatas = [];
            for (let i = 1; i <= 4; i++) {
                const box = document.getElementById(`box${i}`);
                box.innerText = document.getElementById(`input${i}`).value;
                const canvas = await html2canvas(box, { backgroundColor: null, scale: 2 });
                imgDatas.push(canvas.toDataURL('image/png'));
            }

            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(existingPdfBytes);
            const firstPage = pdfDoc.getPages()[0];

            // ปรับตำแหน่งตามฟอร์มของคุณ
            const positions = [
                { x: 100, y: 700, w: 200 },
                { x: 100, y: 650, w: 200 },
                { x: 100, y: 600, w: 200 },
                { x: 100, y: 550, w: 200 }
            ];

            for (let i = 0; i < 4; i++) {
                const pngImage = await pdfDoc.embedPng(imgDatas[i]);
                const dims = pngImage.scale(0.5);
                firstPage.drawImage(pngImage, {
                    x: positions[i].x, y: positions[i].y, width: positions[i].w,
                    height: (positions[i].w / dims.width) * dims.height
                });
            }

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "TOR_Document.pdf";
            link.click();

        } catch (error) {
            alert("ไม่สามารถโหลดไฟล์ template.pdf ได้ ตรวจสอบว่ามีไฟล์อยู่บน GitHub หรือไม่");
        } finally {
            downloadBtn.disabled = false;
            downloadBtn.innerText = "ดาวน์โหลด PDF";
        }
    }

    downloadBtn.addEventListener('click', generatePDF);
</script>

</body>
</html>
