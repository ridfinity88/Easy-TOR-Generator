<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai PDF Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        /* ส่วนที่ใช้สร้างภาพ PNG (ซ่อนไว้ไม่ให้ผู้ใช้เห็น) */
        #capture-container { position: absolute; left: -9999px; top: 0; }
        .render-box { 
            display: inline-block; 
            background: transparent; 
            color: black; 
            white-space: nowrap;
            /* ปรับขนาดตัวอักษรได้ที่นี่ */
            font-size: 24px; 
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>กรอกข้อมูลสำหรับ PDF</h2>
    
    <div class="input-group">
        <label>ข้อมูลที่ 1 (ชื่อ-นามสกุล):</label>
        <input type="text" class="data-input" id="input1" maxlength="50" placeholder="สูงสุด 50 ตัวอักษร">
    </div>
    <div class="input-group">
        <label>ข้อมูลที่ 2 (ที่อยู่):</label>
        <input type="text" class="data-input" id="input2" maxlength="50" placeholder="สูงสุด 50 ตัวอักษร">
    </div>
    <div class="input-group">
        <label>ข้อมูลที่ 3 (เบอร์โทร):</label>
        <input type="text" class="data-input" id="input3" maxlength="50" placeholder="สูงสุด 50 ตัวอักษร">
    </div>
    <div class="input-group">
        <label>ข้อมูลที่ 4 (หมายเหตุ):</label>
        <input type="text" class="data-input" id="input4" maxlength="50" placeholder="สูงสุด 50 ตัวอักษร">
    </div>

    <button id="downloadBtn" disabled>กำลังรอข้อมูล...</button>
</div>

<div id="capture-container">
    <div id="box1" class="render-box"></div>
    <div id="box2" class="render-box"></div>
    <div id="box3" class="render-box"></div>
    <div id="box4" class="render-box"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
    const inputs = document.querySelectorAll('.data-input');
    const downloadBtn = document.getElementById('downloadBtn');

    // ตรวจสอบการกรอกข้อมูลให้ครบ 4 ช่อง
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            const allFilled = Array.from(inputs).every(i => i.value.trim() !== "");
            if (allFilled) {
                downloadBtn.disabled = false;
                downloadBtn.innerText = "ดาวน์โหลด PDF";
            } else {
                downloadBtn.disabled = true;
                downloadBtn.innerText = "กรุณากรอกข้อมูลให้ครบ";
            }
        });
    });

    async function generatePDF() {
        downloadBtn.disabled = true;
        downloadBtn.innerText = "กำลังสร้างไฟล์...";

        try {
            // 1. ดึงไฟล์ PDF ต้นฉบับจาก GitHub (เปลี่ยน URL เป็นของคุณ)
            const templateUrl = 'template.pdf'; 
            const existingPdfBytes = await fetch(templateUrl).then(res => res.arrayBuffer());

            // 2. แปลงข้อความเป็นภาพ PNG
            const imgDatas = [];
            for (let i = 1; i <= 4; i++) {
                const box = document.getElementById(`box${i}`);
                box.innerText = document.getElementById(`input${i}`).value;
                
                const canvas = await html2canvas(box, { backgroundColor: null, scale: 2 });
                imgDatas.push(canvas.toDataURL('image/png'));
            }

            // 3. เริ่มจัดการ PDF
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(existingPdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];

            // --- ตั้งค่าตำแหน่ง (X, Y) และขนาดของแต่ละรูปที่นี่ ---
            // หมายเหตุ: ค่า Y เริ่มจากล่างขึ้นบน (0 คือล่างสุดของกระดาษ)
            const positions = [
                { x: 100, y: 700, w: 200 }, // ของช่องที่ 1
                { x: 100, y: 650, w: 200 }, // ของช่องที่ 2
                { x: 100, y: 600, w: 200 }, // ของช่องที่ 3
                { x: 100, y: 550, w: 200 }  // ของช่องที่ 4
            ];

            for (let i = 0; i < 4; i++) {
                const pngImage = await pdfDoc.embedPng(imgDatas[i]);
                const dims = pngImage.scale(0.5); // ปรับ scale รูปภาพได้
                
                firstPage.drawImage(pngImage, {
                    x: positions[i].x,
                    y: positions[i].y,
                    width: positions[i].w, 
                    height: (positions[i].w / dims.width) * dims.height // ปรับความสูงตามสัดส่วนอัตโนมัติ
                });
            }

            // 4. บันทึกและดาวน์โหลด
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Completed_Form.pdf";
            link.click();

        } catch (error) {
            console.error(error);
            alert("เกิดข้อผิดพลาดในการโหลดไฟล์ต้นฉบับ ตรวจสอบชื่อไฟล์ template.pdf");
        } finally {
            downloadBtn.disabled = false;
            downloadBtn.innerText = "ดาวน์โหลด PDF";
        }
    }

    downloadBtn.addEventListener('click', generatePDF);
</script>

</body>
</html>
